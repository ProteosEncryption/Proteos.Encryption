version: 2

updates:
  # .NET / NuGet package references across the solution.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Bundle minor and patch bumps into a single weekly PR to cut noise; major bumps stay
    # individual so a potentially breaking update gets its own review.
    groups:
      nuget-minor-and-patch:
        update-types:
          - minor
          - patch
    # v1 deliberately stays on the .NET 8 line. Do not auto-propose MAJOR bumps for the framework
    # packages that define the target (EF Core and Microsoft.Extensions); those are decided manually.
    # Patch and minor updates — including security fixes backported to the 8.x line — still flow.
    ignore:
      - dependency-name: "Microsoft.EntityFrameworkCore*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.Extensions.*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the workflows. Few and low-risk, so group them into one PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
